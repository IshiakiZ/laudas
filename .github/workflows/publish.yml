name: publish to pypi

# Triggered by pushing a version tag (e.g. `v0.5.12`).
# Uses PyPI's trusted-publishing flow — no API tokens needed once the
# project is configured at https://pypi.org/manage/account/publishing/

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    name: build wheel + sdist, publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install build deps
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: build sdist + wheel
        run: python -m build

      - name: list artifacts
        run: ls -la dist/

      - name: publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # No password — trusted publishing handles auth via OIDC.
